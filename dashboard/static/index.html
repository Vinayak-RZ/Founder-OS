<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#051f13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Founder OS — Stamped Energy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tokens.css?v=3">
  <link rel="stylesheet" href="/static/components.css?v=3">
  <link rel="stylesheet" href="/static/app.css?v=3">
  <link rel="stylesheet" href="/static/mobile.css?v=3">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="sidebar-backdrop" id="sidebar-backdrop" hidden aria-hidden="true"></div>
  <div class="app">
    <aside class="sidebar top-nav-on-dark" id="sidebar" aria-label="Main navigation">
      <div class="sidebar-head">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">SE</div>
        <div>
          <div class="brand-name">Founder OS</div>
          <div class="brand-sub caption" id="brand-sub">Stamped Energy</div>
        </div>
      </div>
      <button type="button" class="sidebar-close" id="sidebar-close" aria-label="Close navigation">
        <span aria-hidden="true">×</span>
      </button>
      </div>
      <nav class="nav" id="nav">
        <p class="nav-section-label">Overview</p>
        <button type="button" data-view="dashboard" class="nav-link is-active"><span class="nav-link__body"><span>Command</span></span></button>
        <button type="button" data-view="chat" class="nav-link"><span class="nav-link__body"><span>Chat</span></span></button>
        <button type="button" data-view="agents" class="nav-link"><span class="nav-link__body"><span>Agents</span></span></button>
        <p class="nav-section-label">Workspace</p>
        <button type="button" data-view="world" class="nav-link"><span class="nav-link__body"><span>Worlds</span></span></button>
        <button type="button" data-view="crm" class="nav-link"><span class="nav-link__body"><span>CRM</span></span></button>
        <button type="button" data-view="goals" class="nav-link"><span class="nav-link__body"><span>Goals</span></span></button>
        <button type="button" data-view="memory" class="nav-link"><span class="nav-link__body"><span>Memory</span></span></button>
        <p class="nav-section-label">System</p>
        <button type="button" data-view="approvals" class="nav-link"><span class="nav-link__body"><span>Approvals</span></span><span class="badge-pill badge-pill--alert" id="nav-approval-badge" hidden>0</span></button>
        <button type="button" data-view="tools" class="nav-link"><span class="nav-link__body"><span>Tools</span></span></button>
        <button type="button" data-view="activity" class="nav-link"><span class="nav-link__body"><span>Activity</span></span></button>
        <button type="button" data-view="settings" class="nav-link"><span class="nav-link__body"><span>Settings</span></span></button>
      </nav>
      <div class="sidebar-foot caption-uppercase">
        <span class="status-dot" id="status-dot" aria-hidden="true"></span>
        <span id="status-text">Connecting…</span>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button type="button" class="topbar-menu-btn" id="btn-sidebar-open" aria-label="Open navigation" aria-controls="sidebar">
          <span class="topbar-menu-btn__bar" aria-hidden="true"></span>
          <span class="topbar-menu-btn__bar" aria-hidden="true"></span>
          <span class="topbar-menu-btn__bar" aria-hidden="true"></span>
        </button>
        <div class="topbar-lead">
          <h1 class="display-md" id="view-title">Command center</h1>
          <div class="live-strip" id="live-strip" hidden>
            <span class="live-pulse" aria-hidden="true"></span>
            <span class="live-strip-text" id="live-strip-text">Agent working…</span>
          </div>
        </div>
        <div class="topbar-actions">
          <label class="world-select-wrap">
            <span class="caption-uppercase">World</span>
            <select id="world-select" class="world-select" aria-label="Active world context"></select>
          </label>
          <button type="button" class="button-tertiary-text button-sm topbar-icon-btn" id="btn-notifications" aria-label="Notifications">
            <span class="topbar-btn-label">Notifications</span>
            <span class="badge-pill" id="notif-badge" hidden>0</span>
          </button>
          <button type="button" class="button-outline-on-dark button-sm topbar-refresh-btn" id="btn-refresh">Refresh</button>
        </div>
      </header>

      <main class="content" id="main-content">
        <div id="content"></div>
      </main>
    </div>
  </div>

  <nav class="mobile-tabbar" id="mobile-tabbar" aria-label="Mobile navigation">
    <button type="button" class="mobile-tab is-active" data-mobile-view="dashboard" aria-label="Command">
      <span class="mobile-tab__icon" data-icon="dashboard"></span>
      <span class="mobile-tab__label">Command</span>
    </button>
    <button type="button" class="mobile-tab" data-mobile-view="chat" aria-label="Chat">
      <span class="mobile-tab__icon" data-icon="chat"></span>
      <span class="mobile-tab__label">Chat</span>
    </button>
    <button type="button" class="mobile-tab" data-mobile-view="agents" aria-label="Agents">
      <span class="mobile-tab__icon" data-icon="agents"></span>
      <span class="mobile-tab__label">Agents</span>
    </button>
    <button type="button" class="mobile-tab" data-mobile-view="world" aria-label="Worlds">
      <span class="mobile-tab__icon" data-icon="world"></span>
      <span class="mobile-tab__label">Worlds</span>
    </button>
    <button type="button" class="mobile-tab" data-mobile-view="more" aria-label="More" id="mobile-tab-more">
      <span class="mobile-tab__icon" data-icon="more"></span>
      <span class="mobile-tab__label">More</span>
      <span class="mobile-tab__badge badge-pill badge-pill--alert" id="mobile-approval-badge" hidden>0</span>
    </button>
  </nav>

  <dialog class="mobile-menu-drawer" id="mobile-menu-drawer" aria-labelledby="mobile-menu-title">
    <div class="mobile-menu-drawer__grab" aria-hidden="true"></div>
    <div class="mobile-menu-drawer__head">
      <h2 class="title-md" id="mobile-menu-title">Menu</h2>
      <button type="button" class="button-outline-on-dark button-sm" id="mobile-menu-close">Close</button>
    </div>
    <nav class="mobile-menu-nav" aria-label="Secondary navigation">
      <button type="button" class="mobile-menu-link" data-view="approvals">
        <span class="mobile-menu-link__icon" data-icon="approvals"></span>
        <span>Approvals</span>
        <span class="badge-pill badge-pill--alert mobile-menu-link__badge" id="mobile-menu-approval-badge" hidden>0</span>
      </button>
      <button type="button" class="mobile-menu-link" data-view="crm">
        <span class="mobile-menu-link__icon" data-icon="crm"></span>
        <span>CRM</span>
      </button>
      <button type="button" class="mobile-menu-link" data-view="goals">
        <span class="mobile-menu-link__icon" data-icon="goals"></span>
        <span>Goals</span>
      </button>
      <button type="button" class="mobile-menu-link" data-view="memory">
        <span class="mobile-menu-link__icon" data-icon="memory"></span>
        <span>Memory</span>
      </button>
      <button type="button" class="mobile-menu-link" data-view="tools">
        <span class="mobile-menu-link__icon" data-icon="tools"></span>
        <span>Tools</span>
      </button>
      <button type="button" class="mobile-menu-link" data-view="activity">
        <span class="mobile-menu-link__icon" data-icon="activity"></span>
        <span>Activity</span>
      </button>
      <button type="button" class="mobile-menu-link" data-view="settings">
        <span class="mobile-menu-link__icon" data-icon="settings"></span>
        <span>Settings</span>
      </button>
    </nav>
    <div class="mobile-menu-foot caption-uppercase">
      <span class="status-dot" id="mobile-status-dot" aria-hidden="true"></span>
      <span id="mobile-status-text">Connecting…</span>
    </div>
  </dialog>

  <dialog class="drawer" id="notif-drawer" aria-labelledby="notif-title">
    <div class="drawer-head">
      <h2 class="title-md" id="notif-title">Notifications</h2>
      <button type="button" class="button-outline-on-dark button-sm" id="notif-read-all">Mark all read</button>
    </div>
    <div id="notif-list" class="drawer-body"></div>
  </dialog>

  <!-- Core UI first — must not depend on CDN (blocked CDN was preventing app.js from ever running) -->
  <script src="/static/charts.js?v=3"></script>
  <script src="/static/nav-icons.js?v=3"></script>
  <script>
    (function () {
      function setStatus(msg, ok) {
        ["status-text", "mobile-status-text"].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.textContent = msg;
        });
        ["status-dot", "mobile-status-dot"].forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          el.classList.toggle("ok", ok);
          el.classList.toggle("paused", !ok);
        });
      }
      fetch("/api/state", { headers: { Accept: "application/json" } })
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function () { setStatus("Online", true); window.__FOS_API_OK = true; })
        .catch(function (e) {
          console.error("[preflight]", e);
          setStatus("Offline", false);
        });
    })();
  </script>
  <script src="/static/app.js?v=3"></script>
  <!-- Optional enhancements (graphs + motion) — deferred so boot is never blocked -->
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script defer src="/static/graph-viz.js?v=3"></script>
  <script defer src="/static/motion.js?v=3"></script>
  <script defer src="/static/enhance.js?v=3"></script>
</body>
</html>
