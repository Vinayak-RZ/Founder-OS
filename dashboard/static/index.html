<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Founder OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/components.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="app">
    <aside class="sidebar top-nav-on-dark" aria-label="Main navigation">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">FO</div>
        <div>
          <div class="brand-name title-sm">Founder OS</div>
          <div class="brand-sub caption" id="brand-sub">Loading…</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <button type="button" data-view="dashboard" class="nav-link is-active"><span>Dashboard</span></button>
        <button type="button" data-view="chat" class="nav-link"><span>Chat</span></button>
        <button type="button" data-view="approvals" class="nav-link"><span>Approvals</span><span class="badge-pill badge-pill--alert" id="nav-approval-badge" hidden>0</span></button>
        <button type="button" data-view="crm" class="nav-link"><span>CRM</span></button>
        <button type="button" data-view="goals" class="nav-link"><span>Goals &amp; tasks</span></button>
        <button type="button" data-view="memory" class="nav-link"><span>Memory</span></button>
        <button type="button" data-view="tools" class="nav-link"><span>Tools</span></button>
        <button type="button" data-view="activity" class="nav-link"><span>Activity</span></button>
        <button type="button" data-view="settings" class="nav-link"><span>Settings</span></button>
      </nav>
      <div class="sidebar-foot caption-uppercase">
        <span class="status-dot" id="status-dot" aria-hidden="true"></span>
        <span id="status-text">Connecting…</span>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <h1 class="display-md" id="view-title">Dashboard</h1>
        <div class="topbar-actions">
          <button type="button" class="button-tertiary-text button-sm" id="btn-notifications" aria-label="Notifications">
            Notifications <span class="badge-pill" id="notif-badge" hidden>0</span>
          </button>
          <button type="button" class="button-outline-on-dark button-sm" id="btn-refresh">Refresh</button>
        </div>
      </header>

      <main class="content" id="main-content">
        <div id="content"></div>
      </main>
    </div>
  </div>

  <dialog class="drawer" id="notif-drawer" aria-labelledby="notif-title">
    <div class="drawer-head">
      <h2 class="title-md" id="notif-title">Notifications</h2>
      <button type="button" class="button-outline-on-dark button-sm" id="notif-read-all">Mark all read</button>
    </div>
    <div id="notif-list" class="drawer-body"></div>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
