# Founder OS — test on every push/PR; deploy to EC2 on push to main.
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: founder-os-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short
        env:
          WEB_UI_ENABLED: "true"
          TELEGRAM_ENABLED: "false"
          GROQ_API_KEY: ci-placeholder
          QDRANT_URL: https://ci-placeholder.cloud.qdrant.io
          QDRANT_API_KEY: ci-placeholder

  deploy:
    name: Deploy to EC2
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=yes \
            ubuntu@"$EC2_HOST" 'sudo bash /opt/founder-os/deploy/aws/update.sh'
          rm -f ~/.ssh/ec2_deploy_key

      - name: Verify on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=yes ubuntu@"$EC2_HOST" \
            'curl -sf http://127.0.0.1:8787/api/health | grep -Eq "\"ok\"[[:space:]]*:[[:space:]]*true" && curl -sf http://127.0.0.1:8787/api/auth/status | grep -q pin_required'
          rm -f ~/.ssh/ec2_deploy_key

      - name: Public URL smoke (optional)
        continue-on-error: true
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          set -euo pipefail
          raw="${PRODUCTION_URL:-}"
          raw="${raw//$'\r'/}"
          raw="${raw//$'\n'/}"
          if [ -z "$raw" ]; then
            echo "PRODUCTION_URL not set — skipping public smoke"
            exit 0
          fi
          base="${raw%/}"
          echo "Public smoke testing ${base}"
          curl -sSfL --max-time 30 "${base}/api/health" | grep -Eq '"ok"[[:space:]]*:[[:space:]]*true'
          curl -sSfL --max-time 30 "${base}/api/auth/status" | grep -q pin_required
          echo "Public smoke OK"
